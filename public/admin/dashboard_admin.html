<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutoHub - Panel Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .stat-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h5 { color: #cbd5e1; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { font-size: 32px; font-weight: bold; margin: 0; }
        
        .chart-wrapper {
            max-width: 450px;
            margin: 30px auto;
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #334155;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        canvas { max-height: 280px !important; }
        .table-container { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .form-control:focus { background-color: #1e293b; color: white; border-color: #10b981; box-shadow: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm border-bottom border-secondary">
    <div class="container d-flex align-items-center">
        <img src="../css/LOGO.png" width="60" height="55" class="me-2">
        <span class="navbar-brand fw-bold text-success">TutoHub Admin</span>
        <button class="btn btn-outline-danger ms-auto btn-sm fw-bold" onclick="logout()">Cerrar sesión</button>
    </div>
</nav>

<div class="container mt-5">
    <div class="row g-3">
        <div class="col-md-3"><div class="stat-card"><h5>Total Tutorías</h5><h2 class="text-success" id="totalTutorias">0</h2></div></div>
        <div class="col-md-3"><div class="stat-card"><h5>Pendientes</h5><h2 class="text-warning" id="tutoriasPendientes">0</h2></div></div>
        <div class="col-md-3"><div class="stat-card"><h5>Aceptadas</h5><h2 class="text-info" id="tutoriasAceptadas">0</h2></div></div>
        <div class="col-md-3"><div class="stat-card"><h5>Propuestas</h5><h2 class="text-primary" id="tutoriasPropuestas">0</h2></div></div>
    </div>

    <div class="row g-3 mt-1">
        <div class="col-md-6"><div class="stat-card"><h5>Estudiantes</h5><h2 class="text-success" id="totalEstudiantes">0</h2></div></div>
        <div class="col-md-6"><div class="stat-card"><h5>Tutores</h5><h2 class="text-info" id="totalTutores">0</h2></div></div>
    </div>

    <div class="chart-wrapper">
        <h5 class="text-center mb-4">Distribución de Usuarios</h5>
        <canvas id="graficaUsuarios"></canvas>
    </div>

    <div class="mt-5 table-container">
        <h3 class="mb-4 text-success"><i class="bi bi-book"></i> Gestión de Tutorías</h3>
        <input class="form-control bg-dark text-white border-secondary mb-3" id="buscarTutoria" placeholder="🔍 Filtrar por materia o estado..." onkeyup="buscarTutoria()">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead class="table-secondary text-dark">
                    <tr><th>Materia</th><th>Fecha</th><th>Estado</th><th class="text-center">Acción</th></tr>
                </thead>
                <tbody id="tablaTutorias"></tbody>
            </table>
        </div>
    </div>

    <div class="mt-5 mb-5 table-container">
        <h3 class="mb-4 text-info"><i class="bi bi-people"></i> Usuarios Registrados</h3>
        <input class="form-control bg-dark text-white border-secondary mb-3" id="buscarUsuario" placeholder="🔍 Buscar por nombre o correo..." onkeyup="buscarUsuario()">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead class="table-secondary text-dark">
                    <tr><th>Nombre</th><th>Correo</th><th>Rol</th><th class="text-center">Acción</th></tr>
                </thead>
                <tbody id="tablaUsuarios"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/firebase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>

<script>
    // Ejecutar carga de datos al iniciar
    document.addEventListener("DOMContentLoaded", () => {
        cargarTutoriasAdmin();
        cargarUsuariosAdmin();
    });
</script>
</body>
</html>

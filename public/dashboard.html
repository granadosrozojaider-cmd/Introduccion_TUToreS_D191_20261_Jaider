<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Tutorías</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1">Sistema de Tutorías</span>
        <button class="btn btn-danger" onclick="logout()">Cerrar sesión</button>
    </div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">Panel de Usuario</h2>

<!-- PANEL ESTUDIANTE -->
<div id="panelEstudiante">
    <div class="card p-4 mb-4">
        <h3>Solicitar Tutoría</h3>
        <input id="materia" class="form-control mb-3" placeholder="Materia">
        <input type="date" id="fecha" class="form-control mb-3">
        <button class="btn btn-success mb-3" onclick="solicitarTutoria()">Solicitar Tutoría</button>
    </div>

    <div class="card p-4 mb-4">
        <h3>Tutorías Propuestas por Tutores</h3>
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Materia</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="listaTutoriasEstudiante"></tbody>
        </table>
    </div>
</div>

<!-- PANEL TUTOR -->
<div id="panelTutor">
    <div class="card p-4 mb-4">
        <h3>Tutorías Pendientes de Estudiantes</h3>
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Materia</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="listaTutorias"></tbody>
        </table>
    </div>

    <div class="card p-4">
        <h3>Proponer Tutoría</h3>
        <input id="materiaPropuesta" class="form-control mb-2" placeholder="Materia">
        <input type="date" id="fechaPropuesta" class="form-control mb-2">
        <button class="btn btn-primary" onclick="proponerTutoria()">Proponer Tutoría</button>
    </div>
</div>

</div>

<!-- TOASTS -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 1100">
  <div id="liveToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toast-body">
        Mensaje
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<!-- FIREBASE & BOOTSTRAP -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/tutorias.js"></script>

<script>
// Función global para mostrar alertas bonitas
function mostrarAlerta(mensaje, tipo="primary"){
    const toastEl = document.getElementById('liveToast');
    const toastBody = document.getElementById('toast-body');
    toastBody.innerText = mensaje;
    toastEl.className = `toast align-items-center text-bg-${tipo} border-0`;
    const toast = new bootstrap.Toast(toastEl, {delay:3000});
    toast.show();
}

// Validar rol y mostrar panel correspondiente
auth.onAuthStateChanged(user => {
    if(!user){ window.location="index.html"; return; }
    let uid = user.uid;
    db.collection("usuarios").doc(uid).get().then(doc=>{
        let rol = doc.data().rol;
        if(rol==="estudiante"){
            document.getElementById("panelTutor").style.display="none";
            verTutoriasPropuestas();
        }
        if(rol==="tutor"){
            document.getElementById("panelEstudiante").style.display="none";
            verTutorias();
        }
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - TutoHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-dark text-white"> <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container d-flex align-items-center">
            <img src="css/LOGO.png" width="70" height="55" class="me-2">
            <span class="navbar-brand">Sistema de Tutorías</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 bg-secondary text-white shadow-lg"> <h2 class="text-center mb-4 text-success">Crear Cuenta</h2>

                    <div class="mb-3">
                        <input type="text" id="nombre" class="form-control" placeholder="Nombre completo">
                    </div>
                    <div class="mb-3">
                        <input type="email" id="correo" class="form-control" placeholder="Correo electrónico">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" class="form-control" placeholder="Contraseña (mín. 6 caracteres)">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Selecciona tu rol:</label>
                        <select id="rol" class="form-select">
                            <option value="estudiante">Estudiante</option>
                            <option value="tutor">Tutor</option>
                        </select>
                    </div>

                    <button type="button" class="btn btn-success w-100 mb-3" onclick="registrar()">Registrarse</button>

                    <div class="text-center">
                        <a href="index.html" class="text-info text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1100"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/firebase.js?v=1.2"></script>
    <script src="js/auth.js?v=1.2"></script>
</body>
</html>

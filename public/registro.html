<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - TutoHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* Estilo base y fondo */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* La "Caja" estilo Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8) !important;
        }

        /* Estilo de los Inputs y Select */
        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border-color: #198754 !important;
            box-shadow: 0 0 15px rgba(25, 135, 84, 0.2) !important;
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4) !important;
        }

        /* Ajuste para opciones del select */
        option {
            background-color: #1e293b;
            color: white;
        }

        /* Animación suave para el botón */
        .btn-success {
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.2s;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.4);
        }

        .navbar {
            background-color: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="text-white">

    <nav class="navbar navbar-dark border-bottom border-secondary">
        <div class="container d-flex align-items-center">
            <img src="css/LOGO.png" width="70" height="55" class="me-2" alt="Logo">
            <span class="navbar-brand">Sistema de Tutorías</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 glass-card text-white shadow-lg"> 
                    <h2 class="text-center mb-4 text-success fw-bold">Crear Cuenta</h2>

                    <div class="mb-3">
                        <input type="text" id="nombre" class="form-control" placeholder="Nombre completo">
                    </div>
                    <div class="mb-3">
                        <input type="email" id="correo" class="form-control" placeholder="Correo electrónico">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" class="form-control" placeholder="Contraseña (mín. 6 caracteres)">
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-light small">Selecciona tu rol:</label>
                        <select id="rol" class="form-select">
                            <option value="estudiante">Estudiante</option>
                            <option value="tutor">Tutor</option>
                        </select>
                    </div>

                    <button type="button" class="btn btn-success w-100 mb-3 py-2" onclick="registrar()">
                        Registrarse
                    </button>

                    <div class="text-center">
                        <a href="index.html" class="text-info text-decoration-none small">
                            ¿Ya tienes cuenta? Inicia sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1100"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/firebase.js?v=1.2"></script>
    <script src="js/auth.js?v=1.2"></script>
</body>
</html>
